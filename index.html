<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多益 TOEIC 工程英文學習網站</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: `class`,
            theme: {
                extend: {
                    colors: {
                        primary: `#0085FF`,
                        secondary: `#00C49A`,
                        accent: `#FFCC5D`,
                        darkBg: `#202020`,
                        lightBg: `#FFFFFF`,
                    },
                    fontFamily: {
                        sans: [`Poppins`, `sans-serif`],
                    },
                }
            }
        }
    </script>
    <style>
        :root {
            --primary: #0085FF;
            --secondary: #00C49A;
        }
        
        body {
            transition: background-color 0.3s, color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dark .glass-card {
            background: rgba(45, 45, 45, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Flashcard Flip Animation */
        .flip-card {
            perspective: 1000px;
            width: 100%;
            height: 300px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 2rem;
        }

        .flip-card-back {
            transform: rotateY(180deg);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .dark ::-webkit-scrollbar-track {
            background: #2d2d2d;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .kuse-branding {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #727272;
            transition: color 0.3s;
            text-decoration: none;
        }
        .kuse-branding:hover {
            color: #0085FF;
        }
        .kuse-branding svg {
            height: 1.2em;
        }

        .tab-btn.active {
            background-color: var(--primary);
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>

    <script>
        // Data Injection
        const db = {
            prefixes: [

        // State Management
        let state = {
            view: `home`,
            currentWordIdx: 0,
            learningList: [],
            quizList: [],
            quizIdx: 0,
            quizScore: 0,
            quizActive: false,
            favorites: JSON.parse(localStorage.getItem(`toeic_fav`) || `[]`),
            errors: JSON.parse(localStorage.getItem(`toeic_err`) || `[]`),
            progress: parseInt(localStorage.getItem(`toeic_progress`) || `0`),
            goal: 10,
            isDarkMode: localStorage.getItem(`toeic_dark`) === `true`
        };

        // Initialization
        function init() {
            renderCategories();
            renderPrefixes();
            updateProgress();
            setupEventListeners();
            applyTheme();
            
            // Initial view
            showView(`home`);
        }

        function setupEventListeners() {
            // Theme toggle
            document.getElementById(`themeToggle`).onclick = () => {
                state.isDarkMode = !state.isDarkMode;
                localStorage.setItem(`toeic_dark`, state.isDarkMode);
                applyTheme();
            };

            // Flashcard Logic
            document.getElementById(`flashcard`).onclick = (e) => {
                if (e.target.closest(`#card-pronounce`)) return;
                document.getElementById(`flashcard`).classList.toggle(`flipped`);
            };

            document.getElementById(`nextBtn`).onclick = () => {
                if (state.currentWordIdx < state.learningList.length - 1) {
                    state.currentWordIdx++;
                    renderFlashcard();
                    incrementProgress();
                } else {
                    alert(`恭喜！完成這組單字學習。`);
                    showView(`home`);
                }
            };

            document.getElementById(`prevBtn`).onclick = () => {
                if (state.currentWordIdx > 0) {
                    state.currentWordIdx--;
                    renderFlashcard();
                }
            };

            document.getElementById(`favBtn`).onclick = () => {
                const wordObj = state.learningList[state.currentWordIdx];
                toggleFavorite(wordObj);
            };

            // Search Logic
            document.getElementById(`searchInput`).oninput = (e) => {
                const query = e.target.value.toLowerCase().trim();
                const resultsEl = document.getElementById(`searchResults`);
                if (!query) {
                    resultsEl.innerHTML = ``;
                    return;
                }
                const matches = db.words.filter(w => w.word.toLowerCase().includes(query) || w.translation.includes(query));
                resultsEl.innerHTML = matches.map(m => `
                    <div class="p-3 bg-white dark:bg-[#3d3d3d] rounded-lg shadow-sm flex justify-between items-center cursor-pointer hover:bg-primary/5" onclick="peekWord('${m.word}')">
                        <div>
                            <span class="font-bold">${m.word}</span>
                            <span class="text-xs text-gray-400 ml-2">${m.translation}</span>
                        </div>
                        <span class="text-[10px] px-2 py-0.5 rounded bg-gray-100 dark:bg-white/10 uppercase">${m.category}</span>
                    </div>
                `).join(``);
            };
        }

        // View Router
        function showView(viewId) {
            state.view = viewId;
            document.querySelectorAll(`.view`).forEach(v => v.classList.add(`hidden`));
            document.getElementById(`view-${viewId}`).classList.remove(`hidden`);
            
            // Progress visibility
            const progressSection = document.getElementById(`progressSection`);
            if ([`home`, `learning`].includes(viewId)) {
                progressSection.classList.remove(`hidden`);
            } else {
                progressSection.classList.add(`hidden`);
            }

            if (viewId === `favorites`) filterFavorites(`fav`);
            window.scrollTo(0, 0);
        }

        function applyTheme() {
            if (state.isDarkMode) {
                document.documentElement.classList.add(`dark`);
                document.getElementById(`sunIcon`).classList.remove(`hidden`);
                document.getElementById(`moonIcon`).classList.add(`hidden`);
            } else {
                document.documentElement.classList.remove(`dark`);
                document.getElementById(`sunIcon`).classList.add(`hidden`);
                document.getElementById(`moonIcon`).classList.remove(`hidden`);
            }
        }

        function updateProgress() {
            const bar = document.getElementById(`progressBar`);
            const text = document.getElementById(`progressText`);
            const percentage = Math.min((state.progress / state.goal) * 100, 100);
            bar.style.width = `${percentage}%`;
            text.innerText = `${state.progress} / ${state.goal} 單字`;
        }

        function incrementProgress() {
            state.progress++;
            localStorage.setItem(`toeic_progress`, state.progress);
            updateProgress();
        }

        // Feature: Categories
        const categoryMeta = {
            business:     { label: `商業職場`, emoji: `🏢`, color: `#0085FF` },
            travel:       { label: `旅遊交通`, emoji: `✈️`, color: `#00C49A` },
            food:         { label: `飲食美食`, emoji: `🍽️`, color: `#FF8C42` },
            nature:       { label: `自然環境`, emoji: `🌿`, color: `#4CAF50` },
            emotion:      { label: `情感心理`, emoji: `💭`, color: `#9C6FE4` },
            society:      { label: `社會文化`, emoji: `🏛️`, color: `#E91E8C` },
            action:       { label: `動作行為`, emoji: `⚡`, color: `#F5A623` },
            description:  { label: `描述形容`, emoji: `📝`, color: `#607D8B` },
            economy:      { label: `經濟財務`, emoji: `💰`, color: `#185FA5` },
            daily_life:   { label: `日常生活`, emoji: `🏠`, color: `#00BCD4` },
            engineering:  { label: `工程技術`, emoji: `🔧`, color: `#0085FF` },
            electronics:  { label: `電子電路`, emoji: `🔌`, color: `#FF5722` },
            manufacturing:{ label: `製造生產`, emoji: `🏭`, color: `#795548` },
            systems:      { label: `系統整合`, emoji: `⚙️`, color: `#9E9E9E` },
            toeic_core:   { label: `多益核心`, emoji: `📚`, color: `#0085FF` },
            intermediate: { label: `進階詞彙`, emoji: `📖`, color: `#00C49A` },
            toeic_people:      { label: `人物職稱`, emoji: `👤`, color: `#E91E8C` },
            toeic_office:      { label: `辦公室`, emoji: `🖨️`, color: `#0085FF` },
            toeic_hr:          { label: `人事管理`, emoji: `📋`, color: `#9C6FE4` },
            toeic_salary:      { label: `薪資金錢`, emoji: `💴`, color: `#4CAF50` },
            toeic_business_dev:{ label: `業務拓展`, emoji: `📈`, color: `#FF8C42` },
            toeic_finance:     { label: `財務`, emoji: `🏦`, color: `#185FA5` },
            toeic_trade:       { label: `貿易`, emoji: `🚢`, color: `#00BCD4` },
            toeic_meeting:     { label: `會議`, emoji: `🤝`, color: `#607D8B` },
            toeic_3000:        { label: `多益3000單字`, emoji: `📗`, color: `#2196F3` },
        };
        function getCatMeta(cat) {
            return categoryMeta[cat] || { label: cat, emoji: `📌`, color: `#0085FF` };
        }
        function renderCategories() {
            const categories = [...new Set(db.words.map(w => w.category))];
            // Sort by word count desc
            categories.sort((a, b) => db.words.filter(w => w.category === b).length - db.words.filter(w => w.category === a).length);
            const grid = document.getElementById(`categoryGrid`);
            grid.innerHTML = categories.map(cat => {
                const meta = getCatMeta(cat);
                const count = db.words.filter(w => w.category === cat).length;
                return `
                <div class="p-5 bg-white dark:bg-[#2d2d2d] rounded-2xl border border-gray-100 dark:border-white/5 shadow-sm cursor-pointer hover:scale-[1.02] transition-transform" onclick="startLearning('${cat}')">
                    <div class="w-10 h-10 rounded-lg flex items-center justify-center mb-3 text-2xl" style="background:${meta.color}18">
                        ${meta.emoji}
                    </div>
                    <h4 class="font-bold text-sm">${meta.label}</h4>
                    <p class="text-xs text-gray-400 mt-1">${count} 個單字</p>
                </div>`;
            }).join(``);
        }

        // Feature: Flashcards
        function startLearning(category = null) {
            state.learningList = category 
                ? db.words.filter(w => w.category === category)
                : [...db.words].sort(() => Math.random() - 0.5);
            
            state.currentWordIdx = 0;
            renderFlashcard();
            showView(`learning`);
        }

        function renderFlashcard() {
            const wordObj = state.learningList[state.currentWordIdx];
            document.getElementById(`card-word`).innerText = wordObj.word;
            document.getElementById(`card-pos`).innerText = wordObj.pos;
            document.getElementById(`card-translation`).innerText = wordObj.translation;
            document.getElementById(`card-example`).innerText = wordObj.example;
            document.getElementById(`flashcardCounter`).innerText = `${state.currentWordIdx + 1} / ${state.learningList.length}`;
            
            document.getElementById(`flashcard`).classList.remove(`flipped`);
            
            // Check Favorite
            const isFav = state.favorites.some(f => f.word === wordObj.word);
            const favIcon = document.getElementById(`favIconPath`);
            favIcon.setAttribute(`fill`, isFav ? `currentColor` : `none`);
            favIcon.parentElement.classList.toggle(`text-red-500`, isFav);
        }

        function toggleFavorite(wordObj) {
            const idx = state.favorites.findIndex(f => f.word === wordObj.word);
            if (idx > -1) {
                state.favorites.splice(idx, 1);
            } else {
                state.favorites.push(wordObj);
            }
            localStorage.setItem(`toeic_fav`, JSON.stringify(state.favorites));
            renderFlashcard();
        }

        function speakWord(e) {
            e.stopPropagation();
            const word = state.learningList[state.currentWordIdx].word;
            const msg = new SpeechSynthesisUtterance(word);
            msg.lang = `en-US`;
            window.speechSynthesis.speak(msg);
        }

        // AI Powered Quiz Engine
        function startQuiz() {
            // AI Logic: Prioritize error list, then mix with random words
            let pool = [];
            const errorWords = state.errors.slice(0, 3); // Take up to 3 errors
            const randomWords = [...db.words]
                .sort(() => Math.random() - 0.5)
                .slice(0, 10 - errorWords.length);
            
            state.quizList = [...errorWords, ...randomWords].sort(() => Math.random() - 0.5);
            state.quizIdx = 0;
            state.quizScore = 0;
            state.quizActive = true;
            renderQuizQuestion();
            showView(`quiz`);
        }

        function renderQuizQuestion() {
            const current = state.quizList[state.quizIdx];
            const mode = Math.random() > 0.5 ? `en-zh` : `zh-en`;
            
            document.getElementById(`quizProgress`).innerText = `Question ${state.quizIdx + 1} / ${state.quizList.length}`;
            document.getElementById(`quizQuestion`).innerHTML = `
                <div class="text-xs text-primary mb-2 animate-pulse">AI 自動出題中...</div>
                ${mode === `en-zh` ? current.word : current.translation}
            `;
            document.getElementById(`quizScore`).innerText = `Score: ${state.quizScore}`;

            // AI Distractor Engine: Find options with SAME Part of Speech (POS)
            let options = [current];
            const samePosWords = db.words.filter(w => w.pos === current.pos && w.word !== current.word);
            const otherWords = db.words.filter(w => w.pos !== current.pos && w.word !== current.word);
            
            // Prioritize same POS for harder difficulty
            let distractors = [];
            if (samePosWords.length >= 3) {
                distractors = samePosWords.sort(() => Math.random() - 0.5).slice(0, 3);
            } else {
                distractors = [...samePosWords, ...otherWords.sort(() => Math.random() - 0.5)].slice(0, 3);
            }
            
            options = [...options, ...distractors].sort(() => Math.random() - 0.5);

            const optionsContainer = document.getElementById(`quizOptions`);
            optionsContainer.innerHTML = options.map(opt => `
                <button onclick="checkAnswer('${opt.word}', '${current.word}', this)" class="quiz-opt w-full p-4 bg-white dark:bg-[#2d2d2d] rounded-2xl border border-gray-100 dark:border-white/5 text-left font-medium hover:border-primary transition-all active:scale-[0.98]">
                    ${mode === `en-zh` ? opt.translation : opt.word}
                    <span class="float-right text-[10px] text-gray-300 uppercase">${opt.pos}</span>
                </button>
            `).join(``);
        }

        function checkAnswer(selected, correct, el) {
            const options = document.querySelectorAll(`.quiz-opt`);
            options.forEach(opt => opt.disabled = true);

            if (selected === correct) {
                el.classList.add(`!bg-green-500`, `!text-white`, `!border-green-500`);
                state.quizScore += 20;
                document.getElementById(`audioCorrect`).play();
            } else {
                el.classList.add(`!bg-red-500`, `!text-white`, `!border-red-500`);
                // Highlight correct
                options.forEach(opt => {
                    if (opt.innerText.includes(db.words.find(w => w.word === correct).translation) || opt.innerText.includes(correct)) {
                        opt.classList.add(`!border-green-500`, `!text-green-500`);
                    }
                });
                // Record error
                const errWord = db.words.find(w => w.word === correct);
                if (!state.errors.some(e => e.word === errWord.word)) {
                    state.errors.push(errWord);
                    localStorage.setItem(`toeic_err`, JSON.stringify(state.errors));
                }
                document.getElementById(`audioWrong`).play();
            }

            setTimeout(() => {
                state.quizIdx++;
                if (state.quizIdx < state.quizList.length) {
                    renderQuizQuestion();
                } else {
                    finishQuiz();
                }
            }, 1500);
        }

        function finishQuiz() {
            alert(`測驗結束！您的得分是：${state.quizScore}`);
            showView(`home`);
        }

        function confirmExitQuiz() {
            if (confirm(`確定要結束測驗嗎？目前的進度將不會儲存。`)) {
                showView(`home`);
            }
        }

        // Feature: Prefixes
        function renderPrefixes() {
            const grid = document.getElementById(`prefixGrid`);
            grid.innerHTML = db.prefixes.map(p => `
                <div class="bg-white dark:bg-[#2d2d2d] p-6 rounded-3xl border border-gray-100 dark:border-white/5 shadow-sm">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="text-2xl font-bold text-primary">${p.prefix}-</span>
                        <span class="text-gray-400">表示 「${p.meaning}」</span>
                        <span class="ml-auto text-xs text-gray-300">${p.words.length} 個單字</span>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        ${p.words.map(w => {
                            const entry = db.words.find(x => x.word === w);
                            const trans = entry ? entry.translation : ``;
                            const highlight = w.toLowerCase().startsWith(p.prefix)
                                ? `<span class="text-primary font-bold">${w.slice(0, p.prefix.length)}</span>${w.slice(p.prefix.length)}`
                                : w;
                            return `<span onclick="peekWord('${w}')" class="px-3 py-2 bg-gray-50 dark:bg-white/5 rounded-xl text-sm font-medium hover:bg-primary/10 cursor-pointer transition-colors group relative">
                                ${highlight}
                                ${trans ? `<span class="block text-xs text-gray-400 group-hover:text-primary transition-colors">${trans}</span>` : ``}
                            </span>`;
                        }).join(``)}
                    </div>
                </div>
            `).join(``);
        }


        // Feature: Synonyms
        function renderSynonyms() {
            const grid = document.getElementById(`synonymsGrid`);
            grid.innerHTML = db.synonyms.map(group => {
                const wordsHtml = group.words.map(w => {
                    const entry = db.words.find(x => x.word === w);
                    const trans = entry ? entry.translation : ``;
                    const pos = entry ? entry.pos : ``;
                    return `<div onclick="peekWord('${w}')" class="flex items-center justify-between p-3 bg-gray-50 dark:bg-white/5 rounded-xl cursor-pointer hover:bg-primary/10 transition-colors group">
                        <div>
                            <span class="font-semibold text-sm group-hover:text-primary transition-colors">${w}</span>
                            ${trans ? `<span class="block text-xs text-gray-400">${trans}</span>` : ``}
                        </div>
                        ${pos ? `<span class="text-[10px] uppercase px-2 py-1 bg-primary/10 text-primary rounded-full">${pos}</span>` : ``}
                    </div>`;
                }).join(``);
                return `
                <div class="bg-white dark:bg-[#2d2d2d] p-5 rounded-2xl border border-gray-100 dark:border-white/5 shadow-sm">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="text-lg font-bold text-primary">${group.zh}</span>
                        <span class="text-xs text-gray-400 bg-gray-100 dark:bg-white/5 px-2 py-0.5 rounded-full">${group.words.length} 個同義字</span>
                    </div>
                    <div class="space-y-2">${wordsHtml}</div>
                </div>`;
            }).join(``);
        }

        // Feature: My Vocabulary
        function filterFavorites(type) {
            document.getElementById(`tab-fav`).classList.toggle(`active`, type === `fav`);
            document.getElementById(`tab-err`).classList.toggle(`active`, type === `err`);

            const list = type === `fav` ? state.favorites : state.errors;
            const listEl = document.getElementById(`favoritesList`);
            
            if (list.length === 0) {
                listEl.innerHTML = `<div class="col-span-full py-20 text-center text-gray-400">目前沒有資料</div>`;
                return;
            }

            listEl.innerHTML = list.map(item => `
                <div class="bg-white dark:bg-[#2d2d2d] p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-white/5 group animate-fade">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="text-xl font-bold">${item.word}</h4>
                        <button onclick="removeListItem('${item.word}', '${type}')" class="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                    <p class="text-primary font-medium mb-1">${item.translation}</p>
                    <p class="text-xs text-gray-400 italic">${item.example}</p>
                </div>
            `).join(``);
        }

        function removeListItem(word, type) {
            if (type === `fav`) {
                state.favorites = state.favorites.filter(f => f.word !== word);
                localStorage.setItem(`toeic_fav`, JSON.stringify(state.favorites));
            } else {
                state.errors = state.errors.filter(e => e.word !== word);
                localStorage.setItem(`toeic_err`, JSON.stringify(state.errors));
            }
            filterFavorites(type);
        }

        function toggleSearch() {
            const bar = document.getElementById(`searchBar`);
            bar.classList.toggle(`hidden`);
            if (!bar.classList.contains(`hidden`)) {
                document.getElementById(`searchInput`).focus();
            }
        }

        function peekWord(wordStr) {
            const wordObj = db.words.find(w => w.word === wordStr);
            state.learningList = [wordObj];
            state.currentWordIdx = 0;
            renderFlashcard();
            showView(`learning`);
            toggleSearch();
        }

        // Run App
        init();
    </script>
    <script src="https://cdn.kuse.ai/sdk.prd.js"></script>
</body>
</html>
